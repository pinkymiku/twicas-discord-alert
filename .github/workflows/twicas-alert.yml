name: TwitCasting Discord Alert

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
 
permissions:
  contents: write

jobs:
  check-live:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check TwitCasting live status
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TWICAS_USER: gprza
        run: |
          python3 << 'PY'
          import json
          import os
          import urllib.request
          import urllib.error
          import subprocess

          user = os.environ["TWICAS_USER"]
          webhook = os.environ["DISCORD_WEBHOOK"]

          api_url = f"https://frontendapi.twitcasting.tv/users/{user}/latest-movie"
          state_file = "last_movie_id.txt"

          def fetch_json(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0"
                  }
              )
              with urllib.request.urlopen(req, timeout=15) as res:
                  return json.loads(res.read().decode("utf-8"))

          def discord_notify(message):
              payload = json.dumps({"content": message}).encode("utf-8")
              req = urllib.request.Request(
                  webhook,
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              urllib.request.urlopen(req, timeout=15)

          try:
              data = fetch_json(api_url)
          except Exception as e:
              print("Failed to fetch TwitCasting:", e)
              raise SystemExit(0)

          text = json.dumps(data, ensure_ascii=False)
          is_live = True

          movie_id = None
          title = "ツイキャス配信開始"

          def find_value(obj, keys):
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      if k in keys:
                          return v
                      found = find_value(v, keys)
                      if found is not None:
                          return found
              elif isinstance(obj, list):
                  for item in obj:
                      found = find_value(item, keys)
                      if found is not None:
                          return found
              return None

          movie_id = find_value(data, {"id", "movie_id", "movieId"})
          found_title = find_value(data, {"title", "subtitle"})
          if found_title:
              title = str(found_title)

          if not is_live:
              print("Not live.")
              raise SystemExit(0)

          movie_id = str(movie_id or "live")

          last_id = ""
          if os.path.exists(state_file):
              last_id = open(state_file).read().strip()

          if movie_id == last_id:
              print("Already notified.")
              raise SystemExit(0)

          message = f"🚨 ツイキャス配信開始！\n{title}\nhttps://twitcasting.tv/{user}"
          discord_notify(message)

          with open(state_file, "w") as f:
              f.write(movie_id)

          subprocess.run(["git", "config", "user.name", "github-actions"], check=True)
          subprocess.run(["git", "config", "user.email", "github-actions@github.com"], check=True)
          subprocess.run(["git", "add", state_file], check=True)
          subprocess.run(["git", "commit", "-m", "Update last movie id"], check=False)
          subprocess.run(["git", "push"], check=False)

          print("Notification sent.")
          PY
